<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>発表者用 - 総合探究成果報告会</title>
  <link rel="stylesheet" href="presenter.css">
</head>
<body>
  <div id="passwordGate">
    <div class="gate-inner">
      <h1>発表者用ページ</h1>
      <p>パスワードを入力してください。</p>
      <form id="passwordForm">
        <input type="password" id="passwordInput" autocomplete="current-password" placeholder="パスワード">
        <button type="submit" class="btn">入室</button>
      </form>
      <p id="gateError" class="error-message" style="display:none;"></p>
    </div>
  </div>

  <div id="presenterApp" style="display:none;">
    <header class="header">
      <div class="header-top">
        <a href="../index.html" class="back-to-schedule">スケジュール一覧に戻る</a>
        <button type="button" id="logoutBtn" class="btn btn-secondary">退出</button>
      </div>
      <h1>発表者用</h1>
      <p class="subtitle">自分のグループを選び、投影用リンクを開いてください。</p>
    </header>
    <main class="main">
      <section class="group-select-section">
        <h2>グループを選択</h2>
        <p class="hint">グループ名または番号で検索できます。</p>
        <input type="text" id="groupSearch" placeholder="検索（グループ名・番号・テーマ）" class="search-input">
        <ul id="groupList" class="group-list">
          <!-- JS で生成 -->
        </ul>
      </section>
      <section id="selectedGroupSection" class="selected-section" style="display:none;">
        <h2>選択中のグループ</h2>
        <div id="selectedGroupContent"></div>
      </section>
    </main>
  </div>

  <script src="presenter-config.js"></script>
  <script src="presenter.js"></script>
</body>
</html>
